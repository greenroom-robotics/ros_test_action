name: "ROS2 Test Action"
description: "Runs Greenroom's standard ROS2 test setup"
author: "Greenroom Robotics"
branding:
  icon: "package"
  color: "gray-dark"
inputs:
  token:
    description: "The Github token with access to the packages repo and release api"
    required: true
  ros_distro:
    description: "The ROS2 distro to use"
    default: "jazzy"
    required: false
  changed_only:
    description: "Only test changed packages instead of all packages"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Checkout this repository
      uses: actions/checkout@v3
      with:
        lfs: true

    - name: Get changed files
      id: changed-files
      if : ${{ inputs.changed_only }} == 'true'
      uses: tj-actions/changed-files@v47

    - name: Determine changed packages
      id: changed-packages
      if : ${{ inputs.changed_only }} == 'true'
      shell: bash
      run: |
        package_flags=$(${{ github.action_path }}/find_changed_packages.sh "${{ steps.changed-files.outputs.all_changed_files }}")
        echo "package_flags=$package_flags" >> $GITHUB_OUTPUT

    - name: Build Docker Container
      shell: bash
      env:
        API_TOKEN_GITHUB: ${{ inputs.token }}
        GPU: "false"
        ROS_DISTRO: ${{ inputs.ros_distro }}
      run: docker compose build

    - name: Run Tests
      shell: bash
      env:
        API_TOKEN_GITHUB: ${{ inputs.token }}
        GPU: "false"
        ROS_DISTRO: ${{ inputs.ros_distro }}
      run: |
        mkdir results && chmod a+w results
        if [[ "${{ inputs.changed_only }}" == "true" ]]; then
          package_flags="${{ steps.changed-packages.outputs.package_flags }}"
          if [[ -n "$package_flags" ]]; then
            TEST_CMD="platform ros test --results-dir results --include-dependents $package_flags"
          else
            echo "No changed packages found, skipping tests"
            exit 0
          fi
        else
          TEST_CMD="platform ros test --results-dir results"
        fi
        docker compose run tests bash --login -c "$TEST_CMD"

    - name: Publish Test Report
      uses: Greenroom-Robotics/action-junit-report@main
      if: always() # always run even if the previous step fails
      with:
        check_name: 'Test Report'
        report_paths: 'results/*/*.xml'
