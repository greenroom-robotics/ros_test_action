name: "ROS2 Test Action"
description: "Runs Greenroom's standard ROS2 test setup. Supports selective testing by package name."
author: "Greenroom Robotics"
branding:
  icon: "package"
  color: "gray-dark"
inputs:
  token:
    description: "The Github token with access to the packages repo and release api"
    required: true
  ros_distro:
    description: "The ROS2 distro to use"
    required: false
  gpu:
    description: "Whether to build with GPU support (true/false)"
    required: false
    default: "false"
  tests:
    description: "Whether to run tests (true/false)"
    required: false
    default: "true"
  packages:
    description: "Space-separated list of ROS package names to test. Empty = whole workspace."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Checkout this repository
      uses: actions/checkout@v3
      with:
        lfs: true

    # Added after flakiness notes on self-hosted runners (runs-on).
    # More details in: https://github.com/actions/checkout/issues/270
    - name: Fetching LFS Data
      shell: bash
      run: |
        git lfs pull --exclude=""

    - name: Build Docker Container
      shell: bash
      env:
        API_TOKEN_GITHUB: ${{ inputs.token }}
        GPU: ${{ inputs.gpu }}
        ROS_DISTRO: ${{ inputs.ros_distro }}
      run: docker compose build

    - name: Run Tests
      if: ${{ inputs.tests == 'true' }}
      shell: bash
      env:
        API_TOKEN_GITHUB: ${{ inputs.token }}
        GPU: ${{ inputs.gpu }}
        ROS_DISTRO: ${{ inputs.ros_distro }}
        PACKAGES: ${{ inputs.packages }}
      run: |
        mkdir -p results && chmod a+w results
        if [ -n "$PACKAGES" ]; then
          # Loop per-package: `platform ros test --package <pkg>` engages
          # platform_cli's --package handling, which scopes --packages-select
          # to `colcon test` only. Passing --packages-select via raw args
          # (after `--`) leaks it into `colcon test-result`, which rejects it.
          status=0
          for pkg in $PACKAGES; do
            docker compose run --rm --entrypoint bash tests -lc \
              "platform ros test --results-dir results --package $pkg" || status=$?
          done
          exit $status
        else
          docker compose run tests
        fi

    - name: Collect xunit XML for selective runs
      if: ${{ always() && inputs.tests == 'true' && inputs.packages != '' }}
      shell: bash
      run: |
        # When --package isn't passed to `platform ros test`, collect_xunit_xmls
        # is skipped, so hoist xunit XML out of the colcon build/test_results dirs.
        cid=$(docker compose ps -aq tests | head -n1 || true)
        if [ -n "$cid" ]; then
          docker cp "$cid:/home/ros/platform_control/build" ./_build_artifacts || true
          find ./_build_artifacts -path '*/test_results/*.xml' -print0 \
            | while IFS= read -r -d '' f; do
                pkg=$(basename "$(dirname "$(dirname "$f")")")
                mkdir -p "results/$pkg"
                cp "$f" "results/$pkg/"
              done
        fi

    - name: Publish Test Report
      uses: Greenroom-Robotics/action-junit-report@main
      if: ${{ always() && inputs.tests == 'true' }}
      with:
        check_name: 'Test Report'
        report_paths: 'results/*/*.xml'
