name: "ROS2 Test Action"
description: "Runs Greenroom's standard ROS2 test setup"
author: "Greenroom Robotics"
branding:
  icon: "package"
  color: "gray-dark"
inputs:
  token:
    description: "The Github token with access to the packages repo and release api"
    required: true
  ros_distro:
    description: "The ROS2 distro to use"
    required: false
  change_base:
    description: "Base branch to compare changes against (used with changed_only)"
    required: false
    default: "main"

runs:
  using: "composite"
  steps:
    - name: Checkout this repository
      uses: actions/checkout@v3
      with:
        lfs: true

    - name: Get changed files
      id: changed-files
      uses: tj-actions/changed-files@v47

    - name: Determine changed packages
      id: changed-packages
      shell: bash
      run: |
        changed_packages=$(./find_changed_packages.sh "${{ steps.changed-files.outputs.all_changed_files }}")
        echo "changed_packages=$changed_packages" >> $GITHUB_OUTPUT

    - name: Build Docker Container
      shell: bash
      env:
        API_TOKEN_GITHUB: ${{ inputs.token }}
        GPU: "false"
        ROS_DISTRO: ${{ inputs.ros_distro }}
      run: docker compose build

    - name: Run Tests
      shell: bash
      env:
        API_TOKEN_GITHUB: ${{ inputs.token }}
        GPU: "false"
        ROS_DISTRO: ${{ inputs.ros_distro }}
      run: |
        mkdir results && chmod a+w results
        changed_packages="${{ steps.changed-packages.outputs.changed_packages }}"
        package_flags=()
        for package in $changed_packages; do
          package_flags+=(-p "$package")
        done
        TEST_CMD="platform ros test --results-dir results --include-dependents ${package_flags[@]}"
        docker compose run tests bash --login -c "$TEST_CMD"

    - name: Publish Test Report
      uses: Greenroom-Robotics/action-junit-report@main
      if: always() # always run even if the previous step fails
      with:
        check_name: 'Test Report'
        report_paths: 'results/*/*.xml'
